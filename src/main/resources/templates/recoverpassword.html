<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sistema X | Recuperar Contraseña</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <link rel="stylesheet" href="/plugins/fontawesome-free/css/all.min.css">
  <link rel="stylesheet" href="/plugins/icheck-bootstrap/icheck-bootstrap.min.css">
  <link rel="stylesheet" href="/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
</head>
<body class="hold-transition login-page">
<div class="login-box">
  <div class="login-logo">
    <a href="#"><b>Nueva Contraseña</b></a>
  </div>
  <div class="card">
    <div class="card-body login-card-body">
      <p class="login-box-msg">Estás a un paso de tu nueva contraseña. Recupérala ahora.</p>

      <form th:action="@{/auth/savePassword}" method="post">
        
        <input type="hidden" name="token" th:value="${token}">

        <div class="input-group mb-3">
          <input type="password" name="password" class="form-control" placeholder="Nueva Contraseña" required>
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-lock"></span>
            </div>
          </div>
        </div>
        
        <div class="input-group mb-3">
          <input type="password" name="confirmPassword" class="form-control" placeholder="Confirmar Contraseña" required>
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-lock"></span>
            </div>
          </div>
        </div>
        
        <div class="row">
          <div class="col-12">
            <button type="submit" class="btn btn-primary btn-block">Cambiar contraseña</button>
          </div>
          </div>
      </form>

      <p class="mt-3 mb-1 text-center">
        <a th:href="@{/auth/login}">Iniciar Sesión</a>
      </p>
    </div>
    </div>
</div>
<script src="/plugins/jquery/jquery.min.js"></script>
<script src="/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/dist/js/adminlte.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script th:inline="javascript">
    /*<![CDATA[*/
    var mensajeError = /*[[${mensajeError}]]*/ null;
    
    if (mensajeError !== null) {
        Swal.fire({
            icon: 'error',
            title: 'Oops...',
            text: mensajeError,
            confirmButtonColor: '#007bff'
        });
    }
    /*]]>*/
</script>

</body>
</html>
