<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sistema X | Dashboard</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.1/dist/css/adminlte.min.css">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
      </li>
    </ul>
    <ul class="navbar-nav ml-auto">
      <li class="nav-item">
        <a class="nav-link text-dark font-weight-bold" href="#">
          <i class="fas fa-user-circle fa-lg mr-1"></i> <span th:text="${usuario.nombre}">Usuario</span>
        </a>
      </li>
    </ul>
  </nav>

  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <a href="#" class="brand-link">
      <span class="brand-text font-weight-light ml-3"><b>Sistema</b> X</span>
    </a>

    <div class="sidebar">
      <nav class="mt-4">
        <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu" data-accordion="false">
          
          <li class="nav-item">
            <a th:href="@{/inicio}" class="nav-link active">
              <i class="nav-icon fas fa-chart-pie"></i>
              <p>Inicio (Estadísticas)</p>
            </a>
          </li>
          
          <li class="nav-item">
            <a th:href="@{/posts/listado}" class="nav-link">
              <i class="nav-icon fas fa-table"></i>
              <p>CRUD Posts</p>
            </a>
          </li>

          <li class="nav-item">
            <a th:href="@{/comentarios/listado}" class="nav-link">
              <i class="nav-icon fas fa-comments"></i>
              <p>CRUD Comentarios</p>
            </a>
          </li>

          <li class="nav-header">SESIÓN</li>
          <li class="nav-item">
            <a th:href="@{/auth/login}" class="nav-link text-danger">
              <i class="nav-icon fas fa-sign-out-alt"></i>
              <p>Salir</p>
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </aside>

  <div class="content-wrapper">
    <section class="content-header">
      <div class="container-fluid">
        <div class="row mb-2">
          <div class="col-sm-6">
            <h1>Panel de Estadísticas</h1>
          </div>
        </div>
      </div>
    </section>

    <section class="content">
      <div class="container-fluid">
        <div class="row">
          
          <div class="col-md-6">
            <div class="card card-danger">
              <div class="card-header">
                <h3 class="card-title">Proporción de Actividad (Dona)</h3>
              </div>
              <div class="card-body">
                <canvas id="donutChart" style="min-height: 250px; height: 250px; max-height: 250px; max-width: 100%;"></canvas>
              </div>
            </div>
          </div>

          <div class="col-md-6">
            <div class="card card-success">
              <div class="card-header">
                <h3 class="card-title">Comentarios vs Posts (Barras)</h3>
              </div>
              <div class="card-body">
                <div class="chart">
                  <canvas id="barChart" style="min-height: 250px; height: 250px; max-height: 250px; max-width: 100%;"></canvas>
                </div>
              </div>
            </div>
          </div>

          <div class="col-md-6">
            <div class="card card-danger">
              <div class="card-header">
                <h3 class="card-title">Distribución de Registros (Pastel)</h3>
              </div>
              <div class="card-body">
                <canvas id="pieChart" style="min-height: 250px; height: 250px; max-height: 250px; max-width: 100%;"></canvas>
              </div>
            </div>
          </div>

          <div class="col-md-6">
            <div class="card card-success">
              <div class="card-header">
                <h3 class="card-title">Volumen Total (Apiladas)</h3>
              </div>
              <div class="card-body">
                <div class="chart">
                  <canvas id="stackedBarChart" style="min-height: 250px; height: 250px; max-height: 250px; max-width: 100%;"></canvas>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </section>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.1/dist/js/adminlte.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.min.js"></script>

<script th:inline="javascript">
  $(function () {
    
    // Inyectamos los datos reales desde la base de datos (Java)
    var postsReales = [[${totalPosts}]] || 0;
    var comentariosReales = [[${totalComentarios}]] || 0;

    // 1. Datos para Dona y Pastel (Comparando totales)
    var donutData        = {
      labels: ['Posts Registrados', 'Comentarios Totales'],
      datasets: [
        {
          data: [postsReales, comentariosReales],
          backgroundColor : ['#00a65a', '#f39c12'], // Verde y Naranja
        }
      ]
    }

    // Configurar y pintar Dona
    var donutChartCanvas = $('#donutChart').get(0).getContext('2d')
    var donutOptions     = { maintainAspectRatio : false, responsive : true }
    new Chart(donutChartCanvas, { type: 'doughnut', data: donutData, options: donutOptions })

    // Configurar y pintar Pastel
    var pieChartCanvas = $('#pieChart').get(0).getContext('2d')
    var pieOptions     = { maintainAspectRatio : false, responsive : true }
    new Chart(pieChartCanvas, { type: 'pie', data: donutData, options: pieOptions })

    // 2. Datos para Barras (Un solo bloque con ambas barras)
    var barChartData = {
      labels  : ['Resumen General del Sistema'],
      datasets: [
        {
          label               : 'Comentarios',
          backgroundColor     : 'rgba(60,141,188,0.9)',
          borderColor         : 'rgba(60,141,188,0.8)',
          pointRadius          : false,
          pointColor          : '#3b8bba',
          data                : [comentariosReales]
        },
        {
          label               : 'Posts',
          backgroundColor     : 'rgba(210, 214, 222, 1)',
          borderColor         : 'rgba(210, 214, 222, 1)',
          pointRadius         : false,
          pointColor          : 'rgba(210, 214, 222, 1)',
          data                : [postsReales]
        }
      ]
    }

    // Configurar y pintar Barras normales
    var barChartCanvas = $('#barChart').get(0).getContext('2d')
    var barChartOptions = {
      responsive              : true,
      maintainAspectRatio     : false,
      datasetFill             : false,
      scales: {
        yAxes: [{ ticks: { beginAtZero: true } }] // Para que la barra empiece en 0
      }
    }
    new Chart(barChartCanvas, { type: 'bar', data: barChartData, options: barChartOptions })

    // Configurar y pintar Barras Apiladas
    var stackedBarChartCanvas = $('#stackedBarChart').get(0).getContext('2d')
    var stackedBarChartOptions = {
      responsive              : true,
      maintainAspectRatio     : false,
      scales: {
        xAxes: [{ stacked: true }],
        yAxes: [{ stacked: true, ticks: { beginAtZero: true } }]
      }
    }
    new Chart(stackedBarChartCanvas, { type: 'bar', data: barChartData, options: stackedBarChartOptions })
  })
</script>
</body>
</html>
