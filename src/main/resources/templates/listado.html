<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sistema X | Listado de Posts</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <link rel="stylesheet" href="/plugins/fontawesome-free/css/all.min.css">
  <link rel="stylesheet" href="/dist/css/adminlte.min.css">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
      </li>
    </ul>
    <ul class="navbar-nav ml-auto">
      <li class="nav-item">
        <span class="nav-link text-dark font-weight-bold" th:text="${usuario.nombre}">Usuario</span>
      </li>
      <li class="nav-item">
        <a class="nav-link text-danger" href="/auth/login"><i class="fas fa-sign-out-alt"></i> Salir</a>
      </li>
    </ul>
  </nav>

  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <a href="#" class="brand-link text-center">
      <span class="brand-text font-weight-light"><b>Sistema</b> X</span>
    </a>
    <div class="sidebar">
      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">
          <li class="nav-item"><a th:href="@{/inicio}" class="nav-link"><i class="nav-icon fas fa-chart-pie"></i><p>Inicio</p></a></li>
          <li class="nav-item"><a th:href="@{/posts/listado}" class="nav-link active"><i class="nav-icon fas fa-table"></i><p>CRUD Posts</p></a></li>
          <li class="nav-item"><a th:href="@{/comentarios/listado}" class="nav-link"><i class="nav-icon fas fa-comments"></i><p>CRUD Comentarios</p></a></li>
        </ul>
      </nav>
    </div>
  </aside>

  <div class="content-wrapper">
    <section class="content-header">
      <div class="container-fluid">
        <div class="row mb-2">
          <div class="col-sm-6">
            <h1>Gestión de Publicaciones</h1>
          </div>
          <div class="col-sm-6 text-right">
            <a th:href="@{/inicio}" class="btn btn-secondary mr-2"><i class="fas fa-arrow-left"></i> Regresar</a>
            <a th:href="@{/posts/nuevo}" class="btn btn-success"><i class="fas fa-plus"></i> Nueva Publicación</a>
          </div>
        </div>
      </div>
    </section>

    <section class="content">
      <div class="container-fluid">
        <div class="card card-primary card-outline">
          <div class="card-body p-0">
            <table class="table table-striped table-hover">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Título</th>
                  <th>Contenido</th>
                  <th>Autor</th> 
                  <th>Fecha</th>
                  <th class="text-center">Acciones</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="post : ${posts}">
                  <td th:text="${post.post_id}"></td>
                  <td th:text="${post.titulo}"></td>
                  <td th:text="${post.contenido}"></td>
                  <td th:text="${post.autor_id}"></td>
                  <td th:text="${post.fecha_creacion != null ? #temporals.format(post.fecha_creacion, 'dd/MM/yyyy HH:mm') : 'Sin fecha'}"></td>
                  <td class="text-center">
                    <a th:href="@{/posts/editar/{id}(id=${post.post_id})}" class="btn btn-info btn-sm"><i class="fas fa-pencil-alt"></i></a>
                    <a th:href="@{/posts/eliminar/{id}(id=${post.post_id})}" class="btn btn-danger btn-sm"><i class="fas fa-trash"></i></a>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </div> <footer class="main-footer text-center">
    <strong>Copyright &copy; 2026 <a href="#">Sistema X</a>.</strong> Todos los derechos reservados.
  </footer>
</div> <script src="/plugins/jquery/jquery.min.js"></script>
<script src="/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/dist/js/adminlte.min.js"></script>
</body>
</html>
