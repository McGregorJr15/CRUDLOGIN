spring.application.name=CRUDLOGIN

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=jonathanmcgregor235@gmail.com
spring.mail.password=jxadhmtqayjcsezs
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==========================================
# CONEXIÓN A LA BASE DE DATOS LOCAL (MySQL)
# ==========================================
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# CONFIGURACIÓN DE JPA (HIBERNATE)
# ==========================================
# Esto es vital: le dice a Spring que cree/actualice las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
# Muestra en la consola de VS Code qué comandos SQL está ejecutando por detrás (muy útil para debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect